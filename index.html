!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plum 訂單系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F5F2;color:#1A1916;min-height:100vh;padding:1.5rem;}
#modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;}
#modalCard{background:#fff;border-radius:16px;padding:2.5rem 2rem 2rem;width:320px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.18);}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:40px;height:40px;border-radius:12px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;}
.header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tabs{display:flex;gap:10px;margin-bottom:1.75rem;overflow-x:auto;padding-bottom:2px;}
.tab-btn{display:flex;align-items:center;gap:8px;padding:12px 20px;border:1.5px solid #E8E5DE;background:#fff;border-radius:12px;font-size:13px;cursor:pointer;color:#888;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit;}
.tab-btn:hover{border-color:#B8B4F0;color:#534AB7;}
.tab-btn.active{background:#EEEDFE;border-color:#7F77DD;color:#534AB7;font-weight
